<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Verya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --gold:#c9a84c;--gold-l:#e8c96a;
      --f-title:'Cinzel Decorative',serif;
      --f-head:'Cinzel',serif;
      --f-body:'Crimson Text',serif;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:#000;}

    /* CHECKING SESSION — shown while Firebase checks auth */
    #checking-screen{
      position:fixed;inset:0;z-index:300;background:#000;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    }
    .cs-logo{font-family:var(--f-title);font-size:52px;font-weight:700;background:linear-gradient(135deg,#0066ff,#00ccff,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:logoPulse 2s ease-in-out infinite;}
    @keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 16px rgba(0,150,255,0.4));}50%{filter:drop-shadow(0 0 40px rgba(0,200,255,0.9));}}
    .cs-spinner{width:28px;height:28px;border:2px solid rgba(0,150,255,0.15);border-top:2px solid rgba(0,180,255,0.8);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* SPLASH */
    #splash{display:none;position:fixed;inset:0;z-index:100;background:radial-gradient(ellipse at 50% 30%,rgba(0,40,100,0.95),#000 70%);flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;}
    #splash-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
    .splash-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;padding:0 32px;}
    .splash-logo{font-family:var(--f-title);font-size:56px;font-weight:700;background:linear-gradient(135deg,#0066ff,#00ccff,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(0,150,255,0.7));animation:logoPulse 2s ease-in-out infinite;letter-spacing:0.05em;}
    .splash-tagline{font-family:var(--f-body);font-style:italic;font-size:14px;color:rgba(100,200,255,0.7);letter-spacing:0.2em;margin-top:-8px;}
    .splash-bar-wrap{width:260px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:8px;}
    .splash-bar-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,#0055ff,#00ccff);box-shadow:0 0 12px rgba(0,200,255,0.8);transition:width 0.4s ease;}
    .splash-hint{font-family:var(--f-body);font-style:italic;font-size:13px;color:rgba(150,210,255,0.65);text-align:center;min-height:44px;padding:0 16px;animation:hintFade 0.6s ease;}
    @keyframes hintFade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .splash-tap{font-family:var(--f-head);font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(100,200,255,0.5);animation:tapBlink 1.5s ease-in-out infinite;}
    @keyframes tapBlink{0%,100%{opacity:0.2;}50%{opacity:1;}}

    /* LOGIN */
    #login-page{display:none;position:fixed;inset:0;z-index:50;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 20%,rgba(0,40,120,0.5),rgba(0,0,8,0.98) 65%);padding:20px;overflow-y:auto;}
    #login-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
    .login-logo{font-family:var(--f-title);font-size:44px;font-weight:700;background:linear-gradient(135deg,#0055ff,#00ccff,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 24px rgba(0,150,255,0.6));margin-bottom:4px;position:relative;z-index:1;}
    .login-sub{font-family:var(--f-body);font-style:italic;font-size:13px;color:rgba(100,180,255,0.6);letter-spacing:0.15em;margin-bottom:32px;position:relative;z-index:1;}
    .login-card{width:100%;max-width:380px;position:relative;z-index:1;background:rgba(4,6,20,0.95);border:1px solid rgba(0,150,255,0.2);border-radius:20px;padding:28px 22px;}
    .login-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(to right,transparent,rgba(0,200,255,0.5),transparent);}
    .login-tabs{display:flex;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:3px;margin-bottom:22px;}
    .login-tab{flex:1;padding:10px;border-radius:8px;border:none;background:transparent;font-family:var(--f-head);font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.2s;}
    .login-tab.active{background:rgba(0,150,255,0.15);color:rgba(100,210,255,0.95);border:1px solid rgba(0,150,255,0.35);}
    .login-field{margin-bottom:14px;}
    .login-label{font-family:var(--f-head);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(100,180,255,0.6);display:block;margin-bottom:6px;}
    .login-input{width:100%;padding:13px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(0,150,255,0.15);border-radius:10px;font-family:var(--f-body);font-size:15px;color:rgba(255,255,255,0.85);outline:none;transition:border-color 0.2s;}
    .login-input:focus{border-color:rgba(0,150,255,0.45);}
    .login-input::placeholder{color:rgba(255,255,255,0.18);}
    .login-btn{width:100%;padding:15px;margin-top:4px;background:linear-gradient(105deg,#0044cc,#0099ff,#0044cc);border:1px solid rgba(0,200,255,0.4);border-radius:12px;font-family:var(--f-head);font-size:11px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:#fff;cursor:pointer;transition:transform 0.12s;}
    .login-btn:active{transform:scale(0.97);}
    .login-error{font-family:var(--f-body);font-style:italic;font-size:12px;color:#ef4444;text-align:center;margin-top:12px;min-height:18px;}

    /* VERIFY SCREEN */
    #verify-screen{display:none;position:fixed;inset:0;z-index:60;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,8,0.97);padding:32px;text-align:center;gap:16px;}
    .verify-emoji{font-size:64px;}
    .verify-title{font-family:var(--f-title);font-size:20px;background:linear-gradient(135deg,var(--gold),var(--gold-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .verify-desc{font-family:var(--f-body);font-style:italic;font-size:14px;color:rgba(237,224,204,0.75);line-height:1.7;max-width:320px;}
    .verify-email-badge{font-family:var(--f-head);font-size:12px;color:rgba(100,200,255,0.9);background:rgba(0,150,255,0.1);border:1px solid rgba(0,150,255,0.25);border-radius:10px;padding:10px 16px;}
    .verify-btn{width:100%;max-width:300px;padding:14px;background:linear-gradient(105deg,#0044cc,#0099ff,#0044cc);border:1px solid rgba(0,200,255,0.4);border-radius:12px;font-family:var(--f-head);font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#fff;cursor:pointer;}
    .verify-back{font-family:var(--f-head);font-size:10px;letter-spacing:0.15em;color:rgba(100,180,255,0.5);background:none;border:none;cursor:pointer;margin-top:4px;}
  </style>
</head>
<body>

<!-- CHECKING SESSION -->
<div id="checking-screen">
  <div class="cs-logo">VERYA</div>
  <div class="cs-spinner"></div>
</div>

<!-- SPLASH — tap to start music and loading -->
<div id="splash" onclick="onSplashTap()">
  <canvas id="splash-canvas"></canvas>
  <div class="splash-content">
    <div class="splash-logo">VERYA</div>
    <div class="splash-tagline">The world has fallen. Will you rise?</div>
    <div class="splash-bar-wrap"><div class="splash-bar-fill" id="splash-bar"></div></div>
    <div class="splash-hint" id="splash-hint">Tap anywhere to begin...</div>
    <div class="splash-tap">TAP TO ENTER</div>
  </div>
</div>

<!-- LOGIN / REGISTER -->
<div id="login-page">
  <canvas id="login-canvas"></canvas>
  <div class="login-logo">VERYA</div>
  <div class="login-sub">Enter the corrupted world</div>
  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
      <button class="login-tab"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>
    <div id="form-login">
      <div class="login-field">
        <label class="login-label">Email</label>
        <input class="login-input" type="email" id="login-email" placeholder="your@email.com"/>
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input class="login-input" type="password" id="login-pass" placeholder="••••••••"/>
      </div>
      <button class="login-btn" onclick="doLogin()">Enter Verya</button>
    </div>
    <div id="form-register" style="display:none">
      <div class="login-field">
        <label class="login-label">Hero Name</label>
        <input class="login-input" type="text" id="reg-name" placeholder="Choose your name..." maxlength="20"/>
      </div>
      <div class="login-field">
        <label class="login-label">Email</label>
        <input class="login-input" type="email" id="reg-email" placeholder="your@email.com"/>
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input class="login-input" type="password" id="reg-pass" placeholder="Min 6 characters"/>
      </div>
      <button class="login-btn" onclick="doRegister()">Create Hero</button>
    </div>
    <div class="login-error" id="auth-error"></div>
  </div>
</div>

<!-- EMAIL VERIFY SCREEN -->
<div id="verify-screen">
  <div class="verify-emoji">📧</div>
  <div class="verify-title">Verify Your Email</div>
  <div class="verify-desc">We sent a verification link to:</div>
  <div class="verify-email-badge" id="verify-email-shown"></div>
  <div class="verify-desc">Click the link, then sign in below.</div>
  <button class="verify-btn" onclick="resendVerification()">Resend Email</button>
  <button class="verify-back" onclick="backToLogin()">← Back to Sign In</button>
</div>

<script type="module">
import { initializeApp }  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth,
         signInWithEmailAndPassword,
         createUserWithEmailAndPassword,
         sendEmailVerification,
         onAuthStateChanged,
         signOut }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore,
         doc, setDoc }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyAVLi7FV1j-Nd5VABk0BxJxB6P8IYeLaNQ",
  authDomain:"veryagame.firebaseapp.com",
  projectId:"veryagame",
  storageBucket:"veryagame.firebasestorage.app",
  messagingSenderId:"926929873025",
  appId:"1:926929873025:web:ab3f5f5b6b558df6f78580"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ── Audio ── */
let splashAudio = null;
let loginAudio  = null;

function startMusic(src, vol=0.45) {
  const a = new Audio(src); a.loop=true; a.volume=vol;
  a.play().catch(()=>{}); return a;
}

/* ── Particles ── */
function startParticles(canvasId) {
  const cvs = document.getElementById(canvasId); if (!cvs) return;
  cvs.width=window.innerWidth; cvs.height=window.innerHeight;
  const ctx=cvs.getContext('2d');
  const pts=Array.from({length:70},()=>({
    x:Math.random()*cvs.width, y:Math.random()*cvs.height,
    r:Math.random()*1.8+0.3, vx:(Math.random()-0.5)*0.35,
    vy:(Math.random()-0.5)*0.35, a:Math.random()*Math.PI*2
  }));
  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.a+=0.008;
      if(p.x<0||p.x>cvs.width) p.vx*=-1;
      if(p.y<0||p.y>cvs.height) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,180,255,${0.25+Math.sin(p.a)*0.15})`; ctx.fill();
      pts.forEach(q=>{
        const d=Math.hypot(p.x-q.x,p.y-q.y);
        if(d<90){
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
          ctx.strokeStyle=`rgba(0,140,255,${0.05*(1-d/90)})`; ctx.lineWidth=0.4; ctx.stroke();
        }
      });
    });
    requestAnimationFrame(draw);
  }
  draw();
}

/* ── Hints ── */
const HINTS = [
  "💡 Time your attacks — green zone deals full damage.",
  "⚔️ Criminal players earn stars. 6 stars means jail.",
  "🏚️ Start in Ashen Slums and climb to Oblivion Citadel.",
  "💎 Evil items cannot be bought — only crafted or found.",
  "🏠 Own an apartment to expand your vault and studio.",
  "🎯 Complete David's quests to learn everything about Verya.",
  "🔮 SS tier characters have the most powerful abilities.",
  "🪙 Gold Vouchers are worth 1000 coins — spend wisely.",
  "⚡ Energy regenerates over time — use it for combat.",
  "🏛️ Join a guild for shared missions and boosted ranking.",
];
let hintIdx=0;
function nextHint(){
  const el=document.getElementById('splash-hint'); if(!el) return;
  el.style.animation='none'; void el.offsetWidth;
  el.textContent=HINTS[hintIdx%HINTS.length]; el.style.animation='hintFade 0.6s ease'; hintIdx++;
}

/* ── STEP 1: Check if already logged in ── */
/* onAuthStateChanged fires immediately on page load */
let authResolved = false;
onAuthStateChanged(auth, user => {
  if (authResolved) return; /* only handle first fire */
  authResolved = true;

  if (user && user.emailVerified) {
    /* Already logged in and verified — go straight to game */
    window.location.href = 'game.html';
    return;
  }

  /* Not logged in — hide checking screen, show splash */
  document.getElementById('checking-screen').style.display = 'none';
  const splash = document.getElementById('splash');
  splash.style.display = 'flex';
});

/* ── Splash tap ── */
let splashStarted = false;
window.onSplashTap = function() {
  if (splashStarted) return;
  splashStarted = true;
  splashAudio = startMusic('assets/audio/breakingdawn.mp3', 0.55);
  startParticles('splash-canvas');
  runSplash();
};

function runSplash() {
  nextHint();
  const TOTAL=40000, TICKS=25, DELAY=TOTAL/TICKS;
  let tick=0;
  const iv=setInterval(()=>{
    tick++;
    document.getElementById('splash-bar').style.width=Math.min((tick/TICKS)*100,100)+'%';
    if(tick%3===0) nextHint();
    if(tick>=TICKS){ clearInterval(iv); showLogin(); }
  }, DELAY);
}

function showLogin() {
  if(splashAudio){ splashAudio.pause(); splashAudio=null; }
  loginAudio = startMusic('assets/audio/breakingdawn.mp3', 0.45);
  const s=document.getElementById('splash');
  s.style.transition='opacity 0.8s ease'; s.style.opacity='0';
  setTimeout(()=>{
    s.style.display='none';
    const lp=document.getElementById('login-page'); lp.style.display='flex';
    startParticles('login-canvas');
  }, 800);
}

/* ── UI helpers ── */
const setError = msg => { document.getElementById('auth-error').textContent=msg||''; };

window.switchTab = function(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
  document.getElementById('form-login').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? '' : 'none';
  setError('');
};

/* ── Login ── */
window.doLogin = async function() {
  const email=document.getElementById('login-email').value.trim();
  const pass =document.getElementById('login-pass').value;
  if(!email||!pass){ setError('Please fill in all fields.'); return; }
  setError('');
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    if(!cred.user.emailVerified){
      await signOut(auth);
      setError('Please verify your email first. Check your inbox.');
      return;
    }
    /* Verified — redirect to game */
    if(loginAudio){ loginAudio.pause(); loginAudio=null; }
    window.location.href = 'game.html';
  } catch(e) {
    setError(
      e.code==='auth/wrong-password'||e.code==='auth/user-not-found'||e.code==='auth/invalid-credential'
        ? 'Invalid email or password.' : e.message
    );
  }
};

/* ── Register ── */
window.doRegister = async function() {
  const name =document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass =document.getElementById('reg-pass').value;
  if(!name||!email||!pass){ setError('Please fill in all fields.'); return; }
  if(name.length<2){ setError('Hero name must be at least 2 characters.'); return; }
  if(pass.length<6){ setError('Password must be at least 6 characters.'); return; }
  setError('');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const uid  = cred.user.uid;

    /* Send verification email */
    await sendEmailVerification(cred.user);

    /* Create player document */
    await setDoc(doc(db,'players',uid), {
      uid, heroName:name, heroNameLower:name.toLowerCase(), email,
      level:1, xp:0, gold:500, diamonds:0,
      hp:100, maxHp:100, mp:50, maxMp:50,
      energy:100, stamina:100, maxStamina:100,
      inventory:[], equipped:{}, ownedCharacters:[],
      equippedCharacter:null, equippedAbilities:[],
      currentZone:'ashen-slums', clearedZones:[],
      kills:0, totalKills:0, totalBossKills:0,
      goldEarned:0, totalEnters:0, totalScans:0,
      alignment:null, gender:null,
      criminalStars:0, isJailed:false, jailUntil:null,
      pvpEnabled:false, pvpProtection:true,
      friends:[], blockedUsers:[],
      guildId:null, apartments:[], vaultItems:[],
      settings:{},
      skillTree:{forexTrader:0,dataAnalyst:0,assailant:0,cyberElk:0,daemon:0},
      dailyLogin:{lastClaim:null,currentDay:0},
      missionsClaimed:{}, nextRent:{},
      onboardingComplete:false,
      status:'online',
      totalTrades:0, stockWins:0, stockLosses:0, stockNetProfit:0,
      createdAt:new Date().toISOString(),
    });

    /* Sign out — they must verify email then log in */
    await signOut(auth);

    /* Show verify screen */
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('verify-screen').style.display = 'flex';
    document.getElementById('verify-email-shown').textContent = email;

  } catch(e) {
    setError(
      e.code==='auth/email-already-in-use'
        ? 'That email is already registered.' : e.message
    );
  }
};

/* ── Resend verification ── */
let lastVerifyUser = null;
window.resendVerification = async function() {
  setError('Verification email resent! Check your inbox.');
};

/* ── Back to login ── */
window.backToLogin = function() {
  document.getElementById('verify-screen').style.display = 'none';
  document.getElementById('login-page').style.display    = 'flex';
  switchTab('login');
};
</script>
</body>
</html>
