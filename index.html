<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verya — Enter the Realm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --gold:       #c9a84c;
      --gold-light: #e8cc80;
      --gold-dim:   #6b5522;
      --ink:        #07050a;
      --parchment:  #ede0cc;
      --mist:       #9a8fa8;
      --error-bg:   rgba(176,58,46,0.18);
      --error-bd:   rgba(176,58,46,0.5);
      --glass-bg:   rgba(8,6,14,0.55);
      --glass-bd:   rgba(255,255,255,0.10);
      --f-title:    'Cinzel Decorative', serif;
      --f-head:     'Cinzel', serif;
      --f-body:     'Crimson Text', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--ink);
      font-family: var(--f-body);
      color: var(--parchment);
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════
       SHARED SCREEN BASE
    ═══════════════════════════════════════════ */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.7s ease;
    }
    .screen.hidden {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* ═══════════════════════════════════════════
       CORNER ORNAMENTS (reused across screens)
    ═══════════════════════════════════════════ */
    .corner {
      position: absolute;
      width: 36px; height: 36px;
      border-color: rgba(201,168,76,0.35);
      border-style: solid;
    }
    .c-tl { top:20px; left:20px;    border-width: 1px 0 0 1px; }
    .c-tr { top:20px; right:20px;   border-width: 1px 1px 0 0; }
    .c-bl { bottom:20px; left:20px;  border-width: 0 0 1px 1px; }
    .c-br { bottom:20px; right:20px; border-width: 0 1px 1px 0; }

    /* ═══════════════════════════════════════════
       SCREEN 1 — TAP TO ENTER
    ═══════════════════════════════════════════ */
    #screen-tap {
      background: var(--ink);
      gap: 48px;
      cursor: pointer;
      z-index: 500;
    }

    .tap-title {
      font-family: var(--f-title);
      font-size: clamp(42px, 10vw, 80px);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 50%, #8a6520 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titlePulse 3s ease-in-out infinite;
      text-align: center;
    }

    .tap-subtitle {
      font-family: var(--f-head);
      font-size: 11px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.5);
      text-align: center;
    }

    /* Tap to enter button */
    .tap-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #btn-tap {
      font-family: var(--f-head);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      background: none;
      border: 1px solid rgba(201,168,76,0.35);
      padding: 16px 48px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
      animation: btnPulse 2.5s ease-in-out infinite;
    }

    #btn-tap::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(201,168,76,0.0);
      transition: background 0.3s ease;
    }

    #btn-tap:hover {
      border-color: rgba(201,168,76,0.8);
      color: var(--gold-light);
      box-shadow: 0 0 24px rgba(201,168,76,0.25), 0 0 48px rgba(201,168,76,0.1);
    }

    #btn-tap:hover::before { background: rgba(201,168,76,0.05); }

    /* Blinking "tap anywhere" hint below the button */
    .tap-hint {
      font-family: var(--f-body);
      font-style: italic;
      font-size: 13px;
      color: rgba(154,143,168,0.5);
      letter-spacing: 0.08em;
      animation: blink 2s ease-in-out infinite;
    }

    /* Horizontal divider line */
    .tap-divider {
      display: flex; align-items: center; gap: 16px;
      width: clamp(200px, 40vw, 320px);
    }
    .tap-div-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.25), transparent); }
    .tap-div-gem  { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 6px var(--gold); flex-shrink: 0; }

    /* ═══════════════════════════════════════════
       SCREEN 2 — LOADING
    ═══════════════════════════════════════════ */
    #screen-loading {
      background: var(--ink);
      gap: 36px;
      z-index: 400;
      /* Hidden initially — shown after tap */
      opacity: 0;
      pointer-events: none;
    }

    #screen-loading.active {
      opacity: 1;
      pointer-events: all;
    }

    .load-title {
      font-family: var(--f-title);
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 50%, #8a6520 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titlePulse 3s ease-in-out infinite;
    }

    .load-eyebrow {
      font-family: var(--f-head);
      font-size: 10px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.45);
      text-align: center;
    }

    .load-bar-wrap {
      width: clamp(260px, 55vw, 440px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .load-bar-header {
      display: flex;
      justify-content: space-between;
      font-family: var(--f-head);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.55);
    }

    .load-track {
      width: 100%; height: 6px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.18);
      overflow: hidden;
      position: relative;
    }

    #load-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7a5c1e, var(--gold), var(--gold-light));
      box-shadow: 0 0 14px rgba(201,168,76,0.8), 0 0 28px rgba(201,168,76,0.3);
      position: relative;
      transition: width 0.08s linear;
    }

    /* Shimmer on the fill bar */
    #load-fill::after {
      content: '';
      position: absolute; top: 0; right: -20px;
      width: 40px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      animation: shimmer 1s ease infinite;
    }

    #load-status {
      font-family: var(--f-head);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      min-height: 16px;
    }

    /* ═══════════════════════════════════════════
       SCREEN 3 — GAME / LOGIN PAGE
    ═══════════════════════════════════════════ */
    #screen-game {
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }

    #screen-game.active {
      opacity: 1;
      pointer-events: all;
      z-index: 600; /* above loading screen when shown */
    }

    /* Background image */
    .bg-image {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;
      filter: brightness(0.7) saturate(0.85);
    }

    .bg-overlay {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(to bottom,
        rgba(4,2,10,0.3) 0%,
        rgba(4,2,10,0.15) 40%,
        rgba(4,2,10,0.5) 100%);
    }

    /* Login card sits above image */
    .page {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* ═══════════════════════════════════════════
       GLASS CARD
    ═══════════════════════════════════════════ */
    .auth-card {
      position: relative;
      width: 420px;
      max-width: calc(100vw - 32px);
      padding: 48px 40px 44px;
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(1.6) brightness(1.1);
      -webkit-backdrop-filter: blur(28px) saturate(1.6) brightness(1.1);
      border: 1px solid var(--glass-bd);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.09) inset;
      opacity: 0;
      transform: translateY(20px);
      animation: cardAppear 0.9s cubic-bezier(.22,1,.36,1) 0.3s forwards;
    }

    /* Gold rim at top of card */
    .auth-card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.55), transparent);
    }

    /* Card corners */
    .card-corner {
      position: absolute; width: 18px; height: 18px;
      border-color: rgba(201,168,76,0.45); border-style: solid;
    }
    .cc-tl { top:10px; left:10px;    border-width: 1px 0 0 1px; }
    .cc-tr { top:10px; right:10px;   border-width: 1px 1px 0 0; }
    .cc-bl { bottom:10px; left:10px;  border-width: 0 0 1px 1px; }
    .cc-br { bottom:10px; right:10px; border-width: 0 1px 1px 0; }

    /* ═══════════════════════════════════════════
       LOGO
    ═══════════════════════════════════════════ */
    .logo-wrap { text-align: center; margin-bottom: 6px; }

    .logo-eyebrow {
      font-family: var(--f-head); font-size: 10px;
      letter-spacing: 0.45em; text-transform: uppercase;
      color: rgba(201,168,76,0.45); margin-bottom: 10px;
    }

    .logo-name {
      display: block;
      font-family: var(--f-title);
      font-size: clamp(32px, 5vw, 44px);
      font-weight: 900; line-height: 1; letter-spacing: 0.06em;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 45%, #a07830 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.3));
    }

    .logo-tagline {
      font-family: var(--f-body); font-style: italic;
      font-size: 14px; color: rgba(200,188,168,0.65);
      margin-top: 8px; letter-spacing: 0.06em;
    }

    /* ═══════════════════════════════════════════
       DIVIDER
    ═══════════════════════════════════════════ */
    .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0 24px; }
    .div-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.22), transparent); }
    .div-gem  { width: 5px; height: 5px; flex-shrink: 0; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 6px var(--gold); }

    /* ═══════════════════════════════════════════
       TABS
    ═══════════════════════════════════════════ */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 26px;
    }
    .tab-btn {
      flex: 1; background: none; border: none;
      font-family: var(--f-head); font-size: 11px;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(154,143,168,0.65); padding: 11px 0 12px;
      cursor: pointer; position: relative;
      transition: color 0.3s ease;
    }
    .tab-btn::after {
      content: ''; position: absolute;
      bottom: -1px; left: 50%; right: 50%; height: 1px;
      background: var(--gold); box-shadow: 0 0 8px var(--gold);
      transition: left 0.4s cubic-bezier(.22,1,.36,1), right 0.4s cubic-bezier(.22,1,.36,1);
    }
    .tab-btn.active { color: var(--gold-light); }
    .tab-btn.active::after { left: 0; right: 0; }
    .tab-btn:not(.active):hover { color: rgba(232,204,128,0.5); }

    /* ═══════════════════════════════════════════
       PANELS
    ═══════════════════════════════════════════ */
    .tab-panel { display: none; flex-direction: column; gap: 14px; }
    .tab-panel.active { display: flex; animation: panelSlide 0.3s ease forwards; }

    /* ═══════════════════════════════════════════
       FIELDS
    ═══════════════════════════════════════════ */
    .field-label {
      display: block; font-family: var(--f-head);
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(201,168,76,0.55); margin-bottom: 7px;
    }
    .field-wrap { position: relative; }
    .field-wrap .f-ico {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px; color: var(--gold);
      opacity: 0.3; pointer-events: none; transition: opacity 0.3s ease;
    }
    .field-wrap:focus-within .f-ico { opacity: 0.7; }
    .field-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 2px; color: var(--parchment);
      font-family: var(--f-body); font-size: 16px;
      padding: 13px 16px 13px 40px;
      outline: none; -webkit-appearance: none;
      transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }
    .field-wrap input::placeholder { color: rgba(154,143,168,0.45); font-style: italic; font-size: 15px; }
    .field-wrap input:focus {
      border-color: rgba(201,168,76,0.45);
      background: rgba(201,168,76,0.05);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.07);
    }

    /* ═══════════════════════════════════════════
       SUBMIT BUTTON
    ═══════════════════════════════════════════ */
    .btn-submit {
      margin-top: 6px; width: 100%; padding: 15px;
      background: linear-gradient(105deg, rgba(122,92,30,0.9) 0%, rgba(201,168,76,0.95) 45%, rgba(160,120,48,0.9) 70%, rgba(122,92,30,0.9) 100%);
      background-size: 250% 100%; background-position: 100% 0;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 2px; color: #1a0f00;
      font-family: var(--f-head); font-size: 11.5px;
      font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      transition: background-position 0.5s ease, box-shadow 0.3s ease, transform 0.15s ease;
    }
    .btn-submit:hover:not(:disabled) {
      background-position: 0% 0;
      box-shadow: 0 0 24px rgba(201,168,76,0.3), 0 4px 16px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-spinner {
      display: none; width: 13px; height: 13px;
      border: 2px solid rgba(26,15,0,0.3); border-top-color: #1a0f00;
      border-radius: 50%; animation: spin 0.65s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    .btn-submit.loading .btn-spinner { display: inline-block; }
    .btn-submit.loading .btn-text    { opacity: 0.7; }

    /* ═══════════════════════════════════════════
       ERROR
    ═══════════════════════════════════════════ */
    .auth-error {
      padding: 10px 14px;
      background: var(--error-bg); border: 1px solid var(--error-bd);
      border-radius: 2px; color: #e08888;
      font-family: var(--f-body); font-style: italic; font-size: 14px;
      display: none;
    }
    .auth-error.visible { display: block; animation: errShake 0.4s ease; }

    /* ═══════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════ */
    .lore-footer {
      text-align: center; margin-top: 24px;
      font-family: var(--f-body); font-style: italic;
      font-size: 12px; color: rgba(201,168,76,0.3);
      letter-spacing: 0.05em; line-height: 1.6;
    }

    /* ═══════════════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════════════ */
    @keyframes titlePulse {
      0%,100% { filter: drop-shadow(0 0 10px rgba(201,168,76,0.2)); }
      50%     { filter: drop-shadow(0 0 35px rgba(201,168,76,0.65)); }
    }
    @keyframes btnPulse {
      0%,100% { box-shadow: 0 0 0px rgba(201,168,76,0); }
      50%     { box-shadow: 0 0 20px rgba(201,168,76,0.2), 0 0 40px rgba(201,168,76,0.08); }
    }
    @keyframes blink {
      0%,100% { opacity: 0.5; }
      50%     { opacity: 0.15; }
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }
    @keyframes cardAppear {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes panelSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes errShake {
      0%,100% { transform: translateX(0);   }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px);  }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px);  }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 20px 28px; }
    }
  </style>
</head>
<body>

  <!-- Music element -->
  <audio id="bg-music" loop preload="auto">
    <source src="Breaking%20dawn.mp3" type="audio/mpeg" />
  </audio>

  <!-- ═══════════════════════════════════════════════════
       SCREEN 1 — TAP TO ENTER
       This is what the user sees first.
       Tapping it starts the music + loading bar.
  ═══════════════════════════════════════════════════ -->
  <div id="screen-tap" class="screen">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="tap-title">Verya</div>
    <div class="tap-subtitle">&#9670; An Age of Ruin Awaits &#9670;</div>

    <div class="tap-divider">
      <div class="tap-div-line"></div>
      <div class="tap-div-gem"></div>
      <div class="tap-div-line"></div>
    </div>

    <div class="tap-btn-wrap">
      <button id="btn-tap">Tap to Enter</button>
      <span class="tap-hint">touch anywhere to begin</span>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════
       SCREEN 2 — LOADING BAR
       Shown after tap. 5-second XP bar fills up.
  ═══════════════════════════════════════════════════ -->
  <div id="screen-loading" class="screen">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="load-eyebrow">&#9670; Entering the Realm &#9670;</div>
    <div class="load-title">Verya</div>

    <div class="load-bar-wrap">
      <div class="load-bar-header">
        <span>Loading Verya...</span>
        <span id="load-pct">0%</span>
      </div>
      <div class="load-track">
        <div id="load-fill"></div>
      </div>
      <div id="load-status">Awakening the world...</div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════
       SCREEN 3 — GAME / LOGIN PAGE
       Revealed after loading completes.
  ═══════════════════════════════════════════════════ -->
  <div id="screen-game" class="screen">

    <!-- Full screen background image -->
    <img class="bg-image" src="background.jpg" alt="Verya" />
    <div class="bg-overlay"></div>

    <div class="page">
      <div class="auth-card">
        <div class="card-corner cc-tl"></div>
        <div class="card-corner cc-tr"></div>
        <div class="card-corner cc-bl"></div>
        <div class="card-corner cc-br"></div>

        <!-- Logo -->
        <div class="logo-wrap">
          <div class="logo-eyebrow">&#9670; The Realm Awaits &#9670;</div>
          <span class="logo-name">Verya</span>
          <p class="logo-tagline">Who dares enter these lands?</p>
        </div>

        <!-- Divider -->
        <div class="divider">
          <div class="div-line"></div>
          <div class="div-gem"></div>
          <div class="div-line"></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn"        data-tab="register">Register</button>
        </div>

        <!-- LOGIN PANEL -->
        <div id="panel-login" class="tab-panel active">

          <div>
            <label class="field-label" for="login-email">Email Address</label>
            <div class="field-wrap">
              <svg class="f-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              <input id="login-email" type="email" placeholder="your@email.com" autocomplete="email" />
            </div>
          </div>

          <div>
            <label class="field-label" for="login-password">Password</label>
            <div class="field-wrap">
              <svg class="f-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>

  <!-- ═══════════════════════════════════════════════════════════
       MAIN CONTROLLER — tap → music → loading → login page
  ═══════════════════════════════════════════════════════════ -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      var music        = document.getElementById('bg-music');
      var screenTap    = document.getElementById('screen-tap');
      var screenLoad   = document.getElementById('screen-loading');
      var screenGame   = document.getElementById('screen-game');
      var loadFill     = document.getElementById('load-fill');
      var loadPct      = document.getElementById('load-pct');
      var loadStatus   = document.getElementById('load-status');

      music.volume = 1.0; /* MAX volume */

      /* Status messages shown during loading */
      var phases = [
        { at: 0,  msg: 'Awakening the world...'      },
        { at: 18, msg: 'Forging the realm...'         },
        { at: 38, msg: 'Summoning ancient powers...'  },
        { at: 58, msg: 'Binding the fallen...'        },
        { at: 78, msg: 'Opening the gates...'         },
        { at: 96, msg: 'Verya awaits...'              },
      ];

      /* ── Start loading bar (called after tap) ─────────── */
      function startLoading () {
        var progress  = 0;
        var interval  = 40;           /* tick every 40ms   */
        var totalMs   = 5000;         /* 5 seconds total   */
        var step      = 100 / (totalMs / interval);
        var lastPhase = -1;

        var timer = setInterval(function () {
          progress += step;
          if (progress >= 100) progress = 100;

          loadFill.style.width    = progress + '%';
          loadPct.textContent     = Math.floor(progress) + '%';

          /* Phase messages */
          for (var i = phases.length - 1; i >= 0; i--) {
            if (progress >= phases[i].at && lastPhase < i) {
              loadStatus.textContent = phases[i].msg;
              lastPhase = i;
              break;
            }
          }

          /* Complete — reveal game page */
          if (progress >= 100) {
            clearInterval(timer);
            setTimeout(function () {
              screenLoad.classList.add('hidden');
              screenGame.classList.add('active');
            }, 500);
          }
        }, interval);
      }

      /* ── TAP TO ENTER handler ──────────────────────────── */
      var tapped = false; /* guard — ensures onTap runs exactly once */

      function onTap () {
        if (tapped) return;
        tapped = true;

        /* Remove listeners immediately before anything else */
        document.removeEventListener('click',      onTap);
        document.removeEventListener('touchstart', onTap);

        /* Start music — MUST be called directly inside user gesture event */
        music.play().catch(function () {});

        /* Transition: hide tap screen, show loading screen */
        screenTap.classList.add('hidden');
        screenLoad.classList.add('active');

        /* Begin loading bar */
        startLoading();
      }

      /* Listen for tap anywhere OR button click */
      document.addEventListener('click',      onTap);
      document.addEventListener('touchstart', onTap);

      /* ── TAB SWITCHING ─────────────────────────────────── */
      var tabBtns = document.querySelectorAll('.tab-btn');

      tabBtns.forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          /* Prevent tab click from re-triggering onTap */
          e.stopPropagation();

          var target = btn.getAttribute('data-tab');
          tabBtns.forEach(function (b) { b.classList.remove('active'); });
          document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
          document.querySelectorAll('.auth-error').forEach(function (err) { err.classList.remove('visible'); });
          btn.classList.add('active');
          document.getElementById('panel-' + target).classList.add('active');
        });
      });

    });
  </script>


  <!-- ═══════════════════════════════════════════════════════════
       FIREBASE
  ═══════════════════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey:            "AIzaSyAVLi7FV1j-Nd5VABk0BxJxB6P8IYeLaNQ",
      authDomain:        "veryagame.firebaseapp.com",
      projectId:         "veryagame",
      storageBucket:     "veryagame.firebasestorage.app",
      messagingSenderId: "926929873025",
      appId:             "1:926929873025:web:ab3f5f5b6b558df6f78580"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const showErr  = (el, msg) => { el.textContent = msg; el.classList.add('visible'); };
    const clearErr = (el)      => el.classList.remove('visible');
    const setLoad  = (btn, v)  => { btn.disabled = v; btn.classList.toggle('loading', v); };

    const FB_ERRORS = {
      'auth/user-not-found':      'No hero found with that email.',
      'auth/wrong-password':      'The password you entered is incorrect.',
      'auth/invalid-email':       'That email address is not valid.',
      'auth/invalid-credential':  'Invalid email or password.',
      'auth/too-many-requests':   'Too many attempts. Please wait a moment.',
      'auth/email-already-in-use':'This email is already bound to a hero.',
      'auth/weak-password':       'Password must be at least 6 characters.',
    };

    /* LOGIN */
    document.getElementById('btn-login').addEventListener('click', async (e) => {
      e.stopPropagation();
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;
      const err   = document.getElementById('login-error');
      const btn   = document.getElementById('btn-login');
      clearErr(err);
      if (!email) return showErr(err, 'Please enter your email address.');
      if (!pass)  return showErr(err, 'Please enter your password.');
      setLoad(btn, true);
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        btn.querySelector('.btn-text').textContent = '✦ Welcome Back ✦';
        setTimeout(() => window.location.href = 'game.html', 900);
      } catch (e) {
        showErr(err, FB_ERRORS[e.code] || 'Something went wrong. Try again.');
        setLoad(btn, false);
      }
    });

    /* REGISTER */
    document.getElementById('btn-register').addEventListener('click', async (e) => {
      e.stopPropagation();
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass  = document.getElementById('reg-password').value;
      const conf  = document.getElementById('reg-confirm').value;
      const err   = document.getElementById('register-error');
      const btn   = document.getElementById('btn-register');
      clearErr(err);
      if (!name)           return showErr(err, 'Choose a name for your hero.');
      if (name.length < 3) return showErr(err, 'Hero name must be at least 3 characters.');
      if (!email)          return showErr(err, 'Please enter your email address.');
      if (!pass)           return showErr(err, 'Please choose a password.');
      if (pass.length < 6) return showErr(err, 'Password must be at least 6 characters.');
      if (pass !== conf)   return showErr(err, 'Passwords do not match.');
      setLoad(btn, true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await setDoc(doc(db, 'players', cred.user.uid), {
          heroName: name, email,
          level: 1, xp: 0, gold: 100,
          hp: 100, maxHp: 100,
          mp: 50,  maxMp: 50,
          inventory: [],
          createdAt: serverTimestamp(),
        });
        btn.querySelector('.btn-text').textContent = '✦ Legend Created ✦';
        setTimeout(() => window.location.href = 'game.html', 900);
      } catch (e) {
        showErr(err, FB_ERRORS[e.code] || 'Could not create hero. Try again.');
        setLoad(btn, false);
      }
    });

    /* Enter key */
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const active = document.querySelector('.tab-panel.active');
      if (active?.id === 'panel-login') document.getElementById('btn-login').click();
      else document.getElementById('btn-register').click();
    });
  </script>
