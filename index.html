<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Verya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --gold:#c9a84c;--gold-l:#e8c96a;
      --f-title:'Cinzel Decorative',serif;
      --f-head:'Cinzel',serif;
      --f-body:'Crimson Text',serif;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:#000;}

    /* ══ SPLASH SCREEN ══ */
    #splash{
      position:fixed;inset:0;z-index:100;
      background:#000;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:0;
    }
    #splash-canvas{position:absolute;inset:0;width:100%;height:100%;}

    .splash-logo-wrap{
      position:relative;z-index:1;
      display:flex;flex-direction:column;align-items:center;
      margin-bottom:60px;
    }
    .splash-logo{
      font-family:var(--f-title);
      font-size:52px;font-weight:700;letter-spacing:0.08em;
      background:linear-gradient(135deg,#1a4aff,#00c8ff,#1a4aff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 30px rgba(0,150,255,0.6));
      animation:logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse{
      0%,100%{filter:drop-shadow(0 0 20px rgba(0,150,255,0.5));}
      50%{filter:drop-shadow(0 0 50px rgba(0,200,255,0.9));}
    }
    .splash-tagline{
      font-family:var(--f-body);font-style:italic;
      font-size:13px;letter-spacing:0.2em;
      color:rgba(100,180,255,0.7);margin-top:6px;
    }

    .splash-bar-wrap{
      position:relative;z-index:1;
      width:220px;height:3px;
      background:rgba(255,255,255,0.08);
      border-radius:2px;margin-bottom:20px;
    }
    .splash-bar-fill{
      height:100%;border-radius:2px;width:0%;
      background:linear-gradient(90deg,#1a4aff,#00c8ff);
      box-shadow:0 0 10px rgba(0,200,255,0.6);
      transition:width 0.3s ease;
    }
    .splash-hint{
      position:relative;z-index:1;
      font-family:var(--f-body);font-style:italic;
      font-size:13px;color:rgba(150,200,255,0.6);
      text-align:center;padding:0 32px;
      min-height:40px;
      animation:hintFade 0.5s ease;
    }
    @keyframes hintFade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

    /* ══ LOGIN PAGE ══ */
    #login-page{
      display:none;position:fixed;inset:0;z-index:50;
      flex-direction:column;align-items:center;justify-content:center;
      background:radial-gradient(ellipse at 50% 20%,rgba(0,60,150,0.4),rgba(2,0,8,0.98) 70%);
      padding:24px;overflow-y:auto;
    }
    #login-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

    .login-logo{
      font-family:var(--f-title);font-size:42px;font-weight:700;
      background:linear-gradient(135deg,#1a4aff,#00c8ff,#ffffff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:6px;
      filter:drop-shadow(0 0 24px rgba(0,150,255,0.5));
    }
    .login-sub{
      font-family:var(--f-body);font-style:italic;
      font-size:13px;color:rgba(100,180,255,0.6);
      letter-spacing:0.15em;margin-bottom:40px;
    }
    .login-card{
      width:100%;max-width:360px;
      background:rgba(8,6,18,0.92);
      border:1px solid rgba(0,150,255,0.15);
      border-radius:20px;padding:28px 24px;
      position:relative;z-index:1;
    }
    .login-card::before{
      content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
      background:linear-gradient(to right,transparent,rgba(0,200,255,0.4),transparent);
    }
    .login-tabs{
      display:flex;gap:0;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:10px;padding:3px;margin-bottom:24px;
    }
    .login-tab{
      flex:1;padding:9px;border-radius:8px;
      font-family:var(--f-head);font-size:10px;
      font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
      text-align:center;cursor:pointer;
      color:rgba(255,255,255,0.4);border:none;background:transparent;
      transition:all 0.2s;
    }
    .login-tab.active{
      background:rgba(0,150,255,0.15);
      color:rgba(100,200,255,0.9);
      border:1px solid rgba(0,150,255,0.3);
    }
    .login-field{margin-bottom:14px;}
    .login-label{
      font-family:var(--f-head);font-size:9px;
      letter-spacing:0.18em;text-transform:uppercase;
      color:rgba(100,180,255,0.6);margin-bottom:6px;display:block;
    }
    .login-input{
      width:100%;padding:13px 14px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(0,150,255,0.15);border-radius:10px;
      font-family:var(--f-body);font-size:14px;
      color:rgba(255,255,255,0.85);outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    .login-input:focus{
      border-color:rgba(0,150,255,0.4);
      box-shadow:0 0 14px rgba(0,150,255,0.1);
    }
    .login-input::placeholder{color:rgba(255,255,255,0.2);}
    .login-btn{
      width:100%;padding:15px;margin-top:6px;
      background:linear-gradient(105deg,rgba(0,80,200,0.9),rgba(0,160,255,0.95),rgba(0,80,200,0.9));
      border:1px solid rgba(0,200,255,0.35);border-radius:12px;
      font-family:var(--f-head);font-size:11px;font-weight:700;
      letter-spacing:0.25em;text-transform:uppercase;
      color:#001830;cursor:pointer;
      transition:box-shadow 0.2s,transform 0.12s,opacity 0.2s;
    }
    .login-btn:active{transform:scale(0.97);}
    .login-btn:hover{box-shadow:0 0 24px rgba(0,200,255,0.35);}
    .login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .login-error{
      font-family:var(--f-body);font-style:italic;
      font-size:12px;color:#ef4444;
      text-align:center;margin-top:10px;min-height:18px;
    }
    .login-success{
      font-family:var(--f-body);font-style:italic;
      font-size:12px;color:#2ecc71;
      text-align:center;margin-top:10px;min-height:18px;
      line-height:1.5;
    }

    /* ══ EMAIL VERIFICATION SCREEN ══ */
    #verify-page{
      display:none;position:fixed;inset:0;z-index:60;
      flex-direction:column;align-items:center;justify-content:center;
      background:radial-gradient(ellipse at 50% 20%,rgba(0,60,150,0.4),rgba(2,0,8,0.98) 70%);
      padding:32px;text-align:center;
    }
    .verify-icon{font-size:64px;margin-bottom:20px;}
    .verify-title{
      font-family:var(--f-title);font-size:26px;
      background:linear-gradient(135deg,#1a4aff,#00c8ff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;margin-bottom:12px;
    }
    .verify-sub{
      font-family:var(--f-body);font-size:15px;font-style:italic;
      color:rgba(180,210,255,0.8);line-height:1.6;
      max-width:320px;margin-bottom:32px;
    }
    .verify-email-display{
      font-family:var(--f-head);font-size:11px;letter-spacing:0.12em;
      color:rgba(0,200,255,0.9);
      background:rgba(0,150,255,0.08);
      border:1px solid rgba(0,150,255,0.2);
      border-radius:8px;padding:10px 18px;margin-bottom:28px;
    }
    .verify-btn{
      width:100%;max-width:300px;padding:15px;margin-bottom:12px;
      background:linear-gradient(105deg,rgba(0,80,200,0.9),rgba(0,160,255,0.95),rgba(0,80,200,0.9));
      border:1px solid rgba(0,200,255,0.35);border-radius:12px;
      font-family:var(--f-head);font-size:10px;font-weight:700;
      letter-spacing:0.2em;text-transform:uppercase;
      color:#001830;cursor:pointer;
      transition:box-shadow 0.2s,opacity 0.2s;
    }
    .verify-btn:hover{box-shadow:0 0 20px rgba(0,200,255,0.3);}
    .verify-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .verify-btn-ghost{
      width:100%;max-width:300px;padding:13px;
      background:transparent;
      border:1px solid rgba(255,255,255,0.1);border-radius:12px;
      font-family:var(--f-head);font-size:9px;
      letter-spacing:0.15em;text-transform:uppercase;
      color:rgba(255,255,255,0.4);cursor:pointer;
      transition:border-color 0.2s;
    }
    .verify-btn-ghost:hover{border-color:rgba(255,255,255,0.25);}
    .verify-status{
      font-family:var(--f-body);font-style:italic;font-size:13px;
      color:rgba(180,210,255,0.6);margin-top:16px;min-height:20px;
    }
    .verify-cooldown{
      font-family:var(--f-head);font-size:9px;letter-spacing:0.1em;
      color:rgba(100,180,255,0.4);margin-top:8px;
    }
  </style>
</head>
<body>

<!-- ══ SPLASH SCREEN ══ -->
<div id="splash">
  <canvas id="splash-canvas"></canvas>
  <div class="splash-logo-wrap">
    <div class="splash-logo">VERYA</div>
    <div class="splash-tagline">The world has fallen. Will you rise?</div>
  </div>
  <div class="splash-bar-wrap">
    <div class="splash-bar-fill" id="splash-bar"></div>
  </div>
  <div class="splash-hint" id="splash-hint">Entering the world of Verya...</div>
</div>

<!-- ══ LOGIN / REGISTER PAGE ══ -->
<div id="login-page">
  <canvas id="login-canvas"></canvas>
  <div class="login-logo">VERYA</div>
  <div class="login-sub">Enter the corrupted world</div>

  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login"    onclick="switchAuthTab('login')">Sign In</button>
      <button class="login-tab"        id="tab-register" onclick="switchAuthTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <div id="form-login">
      <div class="login-field">
        <label class="login-label">Email</label>
        <input class="login-input" type="email" id="login-email" placeholder="your@email.com"/>
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input class="login-input" type="password" id="login-pass" placeholder="••••••••"/>
      </div>
      <button class="login-btn" id="login-submit-btn" onclick="doLogin()">Enter Verya</button>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none">
      <div class="login-field">
        <label class="login-label">Hero Name</label>
        <input class="login-input" type="text" id="reg-name" placeholder="Choose your name..." maxlength="20"/>
      </div>
      <div class="login-field">
        <label class="login-label">Email</label>
        <input class="login-input" type="email" id="reg-email" placeholder="your@email.com"/>
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input class="login-input" type="password" id="reg-pass" placeholder="Min 6 characters"/>
      </div>
      <button class="login-btn" id="reg-submit-btn" onclick="doRegister()">Create Hero</button>
    </div>

    <div class="login-error"   id="auth-error"></div>
    <div class="login-success" id="auth-success" style="display:none"></div>
  </div>
</div>

<!-- ══ EMAIL VERIFICATION SCREEN ══ -->
<div id="verify-page">
  <div class="verify-icon">✉️</div>
  <div class="verify-title">Check Your Email</div>
  <div class="verify-sub">
    We sent a verification link to your email address. Click the link to activate your account, then press the button below to enter Verya.
  </div>
  <div class="verify-email-display" id="verify-email-display"></div>

  <button class="verify-btn" id="verify-check-btn" onclick="checkVerification()">
    ✅ I've Verified — Enter Verya
  </button>
  <button class="verify-btn-ghost" id="verify-resend-btn" onclick="resendVerification()">
    Resend Email
  </button>
  <button class="verify-btn-ghost" style="margin-top:4px" onclick="backToLogin()">
    ← Back to Login
  </button>

  <div class="verify-status"   id="verify-status"></div>
  <div class="verify-cooldown" id="verify-cooldown"></div>
</div>

<!-- ══ FIREBASE + AUTH SCRIPT ══ -->
<script type="module">
  import { initializeApp }                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth,
           signInWithEmailAndPassword,
           createUserWithEmailAndPassword,
           sendEmailVerification,
           reload,
           signOut,
           onAuthStateChanged }                         from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc }          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey:           "AIzaSyAVLi7FV1j-Nd5VABk0BxJxB6P8IYeLaNQ",
    authDomain:       "veryagame.firebaseapp.com",
    projectId:        "veryagame",
    storageBucket:    "veryagame.firebasestorage.app",
    messagingSenderId:"926929873025",
    appId:            "1:926929873025:web:ab3f5f5b6b558df6f78580"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  /* ────────────────────────────────────────
     SPLASH ANIMATION
  ──────────────────────────────────────── */
  const HINTS = [
    "💡 Complete daily missions to earn extra gold and XP.",
    "⚔️ Time your attacks carefully — green zone means full damage.",
    "🏚️ Start in Ashen Slums and work your way to Oblivion Citadel.",
    "💎 Evil items can only be found by crafting or zone drops.",
    "🏠 Own an apartment to expand your inventory vault.",
  ];

  let hintIdx  = 0;
  let progress = 0;
  const bar    = document.getElementById('splash-bar');
  const hintEl = document.getElementById('splash-hint');

  function nextHint() {
    hintEl.style.animation = 'none';
    void hintEl.offsetWidth;
    hintEl.textContent     = HINTS[hintIdx % HINTS.length];
    hintEl.style.animation = 'hintFade 0.5s ease';
    hintIdx++;
  }

  function animateSplash(onDone) {
    nextHint();
    const interval = setInterval(() => {
      progress += Math.random() * 18 + 8;
      if (progress >= 100) { progress = 100; clearInterval(interval); onDone(); }
      bar.style.width = Math.min(progress, 100) + '%';
      if (progress < 100 && progress % 20 < 10) nextHint();
    }, 400);
  }

  function startParticles(canvasId) {
    const cvs = document.getElementById(canvasId);
    if (!cvs) return;
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
    const ctx = cvs.getContext('2d');
    const particles = Array.from({length:80}, () => ({
      x:Math.random()*cvs.width, y:Math.random()*cvs.height,
      r:Math.random()*2+0.5, vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4, a:Math.random(),
    }));
    let animId;
    function draw() {
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.a += 0.005;
        if (p.x < 0 || p.x > cvs.width)  p.vx *= -1;
        if (p.y < 0 || p.y > cvs.height) p.vy *= -1;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0,180,255,${0.3+Math.sin(p.a)*0.2})`;
        ctx.fill();
        particles.forEach(q => {
          const d = Math.hypot(p.x-q.x, p.y-q.y);
          if (d < 100) {
            ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
            ctx.strokeStyle = `rgba(0,150,255,${0.06*(1-d/100)})`;
            ctx.lineWidth = 0.5; ctx.stroke();
          }
        });
      });
      animId = requestAnimationFrame(draw);
    }
    draw();
    return () => cancelAnimationFrame(animId);
  }

  function showLogin() {
    const splash = document.getElementById('splash');
    splash.style.transition = 'opacity 0.8s ease';
    splash.style.opacity    = '0';
    setTimeout(() => {
      splash.style.display    = 'none';
      const lp = document.getElementById('login-page');
      lp.style.display        = 'flex';
      startParticles('login-canvas');
    }, 800);
  }

  /* ────────────────────────────────────────
     AUTH STATE — FIX: only redirect verified
     accounts that have completed onboarding.
     New registrations stay on verify screen.
  ──────────────────────────────────────── */
  onAuthStateChanged(auth, async user => {
    // No user — show login after splash
    if (!user) return;

    // User exists — check email verification
    if (!user.emailVerified) {
      // They were already on the verify screen — do nothing, let that UI handle it
      return;
    }

    // Email is verified — check if onboarding was completed
    try {
      const snap = await getDoc(doc(db, 'players', user.uid));
      if (!snap.exists()) {
        // Player doc missing — sign them out and back to login
        await signOut(auth);
        return;
      }
      // Both verified + has player doc — go to game
      window.location.href = 'game.html';
    } catch (e) {
      console.error('Auth check error:', e);
    }
  });

  animateSplash(() => setTimeout(showLogin, 400));

  /* ────────────────────────────────────────
     HELPERS
  ──────────────────────────────────────── */
  const setError   = msg => {
    document.getElementById('auth-error').textContent    = msg || '';
    document.getElementById('auth-success').style.display = 'none';
  };
  const setSuccess = msg => {
    document.getElementById('auth-success').textContent   = msg;
    document.getElementById('auth-success').style.display = '';
    document.getElementById('auth-error').textContent     = '';
  };
  const setBtnLoading = (id, loading, label) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.disabled     = loading;
    btn.textContent  = loading ? '⏳ Please wait...' : label;
  };

  /* ────────────────────────────────────────
     TAB SWITCHER
  ──────────────────────────────────────── */
  window.switchAuthTab = function(tab) {
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('auth-error').textContent      = '';
    document.getElementById('auth-success').style.display  = 'none';
  };

  /* ────────────────────────────────────────
     LOGIN
  ──────────────────────────────────────── */
  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { setError('Please fill in all fields.'); return; }

    setBtnLoading('login-submit-btn', true, 'Enter Verya');
    setError('');

    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);

      // FIX: block entry if email not verified
      if (!cred.user.emailVerified) {
        showVerifyScreen(email);
        setBtnLoading('login-submit-btn', false, 'Enter Verya');
        return;
      }
      // onAuthStateChanged will handle the redirect
    } catch(e) {
      setBtnLoading('login-submit-btn', false, 'Enter Verya');
      const code = e.code;
      if (code === 'auth/wrong-password' || code === 'auth/user-not-found' || code === 'auth/invalid-credential') {
        setError('Invalid email or password.');
      } else if (code === 'auth/too-many-requests') {
        setError('Too many attempts. Please try again later.');
      } else {
        setError(e.message);
      }
    }
  };

  /* ────────────────────────────────────────
     REGISTER
     FIX: sends verification email, writes
     heroNameLower for player search,
     shows verify screen instead of redirecting
  ──────────────────────────────────────── */
  window.doRegister = async function() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;

    if (!name || !email || !pass) { setError('Please fill in all fields.'); return; }
    if (name.length < 2)          { setError('Hero name must be at least 2 characters.'); return; }
    if (pass.length < 6)          { setError('Password must be at least 6 characters.'); return; }

    setBtnLoading('reg-submit-btn', true, 'Create Hero');
    setError('');

    try {
      // Create Firebase Auth account
      const cred = await createUserWithEmailAndPassword(auth, email, pass);

      // Write player document to Firestore
      // FIX: write heroNameLower so social search works
      await setDoc(doc(db, 'players', cred.user.uid), {
        heroName:          name,
        heroNameLower:     name.toLowerCase(),
        email,
        level:             1,
        xp:                0,
        gold:              500,
        diamonds:          0,
        hp:                100,
        maxHp:             100,
        mp:                50,
        maxMp:             50,
        energy:            100,
        stamina:           100,
        maxStamina:        100,
        inventory:         [],
        equipped:          {},
        ownedCharacters:   [],
        equippedCharacter: null,
        equippedAbilities: [],
        currentZone:       'ashen-slums',
        clearedZones:      [],
        kills:             0,
        totalKills:        0,
        totalBossKills:    0,
        goldEarned:        0,
        totalEnters:       0,
        totalScans:        0,
        totalTrades:       0,
        totalChirpLikes:   0,
        alignment:         null,
        gender:            null,
        criminalStars:     0,
        isJailed:          false,
        jailUntil:         null,
        pvpEnabled:        false,
        pvpProtection:     true,
        friends:           [],
        blockedUsers:      [],
        guildId:           null,
        apartmentId:       null,
        apartments:        [],
        vaultItems:        [],
        studioTokens:      0,
        pachinkoTokens:    0,
        goldVouchers:      0,
        settings:          {},
        skillTree:         { forexTrader:0, dataAnalyst:0, assailant:0, cyberElk:0, daemon:0 },
        dailyLogin:        { lastClaim:null, currentDay:0, streak:0 },
        missionsClaimed:   {},
        completedQuests:   [],
        specialQuests:     {},
        soulClass:         'Wanderer',
        avatar:            '⚔️',
        onboardingComplete: false,
        createdAt:         new Date().toISOString(),
      });

      // FIX: send email verification — do NOT redirect to game yet
      await sendEmailVerification(cred.user);

      setBtnLoading('reg-submit-btn', false, 'Create Hero');
      showVerifyScreen(email);

    } catch(e) {
      setBtnLoading('reg-submit-btn', false, 'Create Hero');
      if (e.code === 'auth/email-already-in-use') {
        setError('An account with this email already exists.');
      } else if (e.code === 'auth/invalid-email') {
        setError('Please enter a valid email address.');
      } else {
        setError(e.message);
      }
    }
  };

  /* ────────────────────────────────────────
     VERIFY SCREEN
  ──────────────────────────────────────── */
  let resendCooldown = 0;
  let cooldownTimer  = null;

  function showVerifyScreen(email) {
    document.getElementById('login-page').style.display  = 'none';
    const vp = document.getElementById('verify-page');
    vp.style.display = 'flex';
    document.getElementById('verify-email-display').textContent = email;
    document.getElementById('verify-status').textContent        = '';
    startResendCooldown(60); // 60s cooldown after first send
  }

  function startResendCooldown(seconds) {
    resendCooldown = seconds;
    const btn = document.getElementById('verify-resend-btn');
    if (btn) btn.disabled = true;
    clearInterval(cooldownTimer);
    cooldownTimer = setInterval(() => {
      resendCooldown--;
      const cdEl = document.getElementById('verify-cooldown');
      if (cdEl) cdEl.textContent = resendCooldown > 0 ? `Resend available in ${resendCooldown}s` : '';
      if (resendCooldown <= 0) {
        clearInterval(cooldownTimer);
        if (btn) btn.disabled = false;
      }
    }, 1000);
  }

  // FIX: check verification by reloading the auth user — don't rely on onAuthStateChanged alone
  window.checkVerification = async function() {
    const user = auth.currentUser;
    if (!user) { document.getElementById('verify-status').textContent = 'Session expired. Please log in again.'; return; }

    const btn = document.getElementById('verify-check-btn');
    btn.disabled    = true;
    btn.textContent = '⏳ Checking...';
    document.getElementById('verify-status').textContent = '';

    try {
      // Reload forces Firebase to re-check the email verification status
      await reload(user);
      if (user.emailVerified) {
        document.getElementById('verify-status').textContent = '✅ Verified! Entering Verya...';
        setTimeout(() => { window.location.href = 'game.html'; }, 800);
      } else {
        btn.disabled    = false;
        btn.textContent = '✅ I\'ve Verified — Enter Verya';
        document.getElementById('verify-status').textContent = '❌ Email not verified yet. Check your inbox (and spam folder).';
      }
    } catch(e) {
      btn.disabled    = false;
      btn.textContent = '✅ I\'ve Verified — Enter Verya';
      document.getElementById('verify-status').textContent = 'Error checking verification. Please try again.';
    }
  };

  window.resendVerification = async function() {
    const user = auth.currentUser;
    if (!user) { document.getElementById('verify-status').textContent = 'Session expired. Please log in again.'; return; }
    try {
      await sendEmailVerification(user);
      document.getElementById('verify-status').textContent = '📧 Verification email resent!';
      startResendCooldown(60);
    } catch(e) {
      if (e.code === 'auth/too-many-requests') {
        document.getElementById('verify-status').textContent = 'Too many requests. Please wait before resending.';
      } else {
        document.getElementById('verify-status').textContent = 'Could not resend email. Try again shortly.';
      }
    }
  };

  window.backToLogin = async function() {
    // Sign out so they don't stay in a half-authenticated state
    try { await signOut(auth); } catch(e) {}
    document.getElementById('verify-page').style.display  = 'none';
    document.getElementById('login-page').style.display   = 'flex';
    switchAuthTab('login');
    clearInterval(cooldownTimer);
    document.getElementById('verify-cooldown').textContent = '';
  };

  /* Enter key support on login / register forms */
  document.getElementById('login-pass')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('reg-pass')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doRegister();
  });
</script>
</body>
</html>
